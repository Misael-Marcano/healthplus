version: '3.9'

services:
  # ── SQL Server ────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthplus_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "HealthPlus@2024!"
      MSSQL_PID: "Express"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/init-mssql.sh:/init-mssql.sh
    entrypoint: ["/bin/bash", "/init-mssql.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'HealthPlus@2024!' -Q 'SELECT 1' -C -b > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  # ── Backend NestJS ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthplus_api
    env_file: ./backend/.env
    environment:
      PORT: 3001
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "HealthPlus@2024!"
      DB_NAME: healthplus_db
      JWT_SECRET: healthplus_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: healthplus_refresh_secret_change_in_production
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  # ── Frontend Next.js ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: healthplus_web
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: on-failure

volumes:
  sqlserver_data:
